name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install ALSA dev headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --release

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install ALSA dev headers (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Set up cross toolchain (Linux aarch64)
        if: matrix.cross == true
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: aarch64-unknown-linux-gnu

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux)
        if: runner.os != 'macOS'
        run: strip target/${{ matrix.target }}/release/sound-cabinet

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/sound-cabinet \
             sound-cabinet-${{ github.ref_name }}-${{ matrix.target }}

      - name: Compute SHA-256 (Linux)
        if: runner.os == 'Linux'
        run: |
          BIN="sound-cabinet-${{ github.ref_name }}-${{ matrix.target }}"
          sha256sum "$BIN" > "$BIN.sha256"

      - name: Compute SHA-256 (macOS)
        if: runner.os == 'macOS'
        run: |
          BIN="sound-cabinet-${{ github.ref_name }}-${{ matrix.target }}"
          DIGEST=$(shasum -a 256 "$BIN" | awk '{print $1}')
          printf '%s  %s\n' "$DIGEST" "$BIN" > "$BIN.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: |
            sound-cabinet-${{ github.ref_name }}-${{ matrix.target }}
            sound-cabinet-${{ github.ref_name }}-${{ matrix.target }}.sha256

  publish:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/sound-cabinet-*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
